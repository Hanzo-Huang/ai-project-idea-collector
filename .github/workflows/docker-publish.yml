name: Publish Docker images

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.component.name }} (${{ matrix.target.arch }})
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
        target:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.target.runner }}
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/${{ matrix.component.name }}
    steps:
      - name: Normalize image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: ${{ matrix.component.context }}
          platforms: ${{ matrix.target.platform }}
          tags: ${{ env.IMAGE_NAME }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.component.name }}-${{ matrix.target.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-${{ matrix.target.arch }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.component.name }}-${{ matrix.target.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish ${{ matrix.component }} manifest
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component: [backend, frontend]
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/${{ matrix.component }}
    steps:
      - name: Normalize image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-
      - name: Create multi-architecture manifest
        working-directory: /tmp/digests
        run: |
          args=()
          while IFS= read -r tag; do
            args+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          for digest in *; do
            args+=("${IMAGE_NAME}@sha256:${digest}")
          done
          docker buildx imagetools create "${args[@]}"
      - name: Inspect published image
        run: |
          tag="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          docker buildx imagetools inspect "$tag"
