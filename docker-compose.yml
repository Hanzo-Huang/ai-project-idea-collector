services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collector}
      POSTGRES_USER: ${POSTGRES_USER:-collector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collector}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collector} -d ${POSTGRES_DB:-collector}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports: ["127.0.0.1:5432:5432"]

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes: ["qdrant_data:/qdrant/storage"]
    ports: ["127.0.0.1:6333:6333"]
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: collector-backend:local
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_URL: ${DOCKER_POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-collector}:${POSTGRES_PASSWORD:-collector}@postgres:5432/${POSTGRES_DB:-collector}}
      QDRANT_URL: ${DOCKER_QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    ports: ["${BACKEND_BIND_ADDRESS:-127.0.0.1}:8000:8000"]
    restart: unless-stopped

  worker:
    image: collector-backend:local
    command: ["python", "-m", "app.worker.main"]
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_URL: ${DOCKER_POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-collector}:${POSTGRES_PASSWORD:-collector}@postgres:5432/${POSTGRES_DB:-collector}}
      QDRANT_URL: ${DOCKER_QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    image: collector-frontend:local
    build:
      context: ./frontend
      args:
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
    depends_on: [backend]
    ports: ["${FRONTEND_BIND_ADDRESS:-127.0.0.1}:3000:3000"]
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
